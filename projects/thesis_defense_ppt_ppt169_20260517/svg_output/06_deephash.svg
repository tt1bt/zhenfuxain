  <text x="120" y="230" fill="#2C3E50" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">• SH (Supervision Hashing)</text>
  <text x="120" y="265" fill="#7F8C8D" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">成对监督信息</text>
  <text x="120" y="310" fill="#2C3E50" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">• DSH (Deep Supervised Hash)</text>
  <text x="120" y="345" fill="#7F8C8D" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">深度监督</text>
  <text x="120" y="390" fill="#2C3E50" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">• CNNH</text>
  <text x="120" y="425" fill="#7F8C8D" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">卷积神经网络哈希</text>
