  <text x="640" y="168" text-anchor="middle" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">无监督哈希方法</text>
  <text x="500" y="230" fill="#2C3E50" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">• ITQ (Iterative Quantization)</text>
  <text x="500" y="265" fill="#7F8C8D" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">迭代量化</text>
  <text x="500" y="310" fill="#2C3E50" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">• SDH (Sparse Discrete Hash)</text>
  <text x="500" y="345" fill="#7F8C8D" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">稀疏离散哈希</text>
  <text x="500" y="390" fill="#2C3E50" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">• 基于重构的方法</text>
  <text x="500" y="425" fill="#7F8C8D" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">矩阵分解</text>
