  <text x="740" y="175" fill="#2C3E50" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">现有方法的局限性</text>
  <text x="700" y="210" fill="#7F8C8D" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">默认数据分布相对均衡</text>
  <text x="700" y="235" fill="#7F8C8D" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">长尾数据上训练不足</text>
