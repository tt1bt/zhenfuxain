  <text x="160" y="175" fill="#2C3E50" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">深度哈希方法优势</text>
  <text x="120" y="210" fill="#7F8C8D" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">存储效率高、检索速度快</text>
