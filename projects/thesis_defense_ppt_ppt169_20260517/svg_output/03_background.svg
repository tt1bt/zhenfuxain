  <text x="700" y="560" fill="#7F8C8D" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" text-anchor="middle">充足</text>
  <rect x="760" y="360" width="80" height="160" rx="4" fill="#3498DB"/>
  <rect x="860" y="360" width="80" height="100" rx="4" fill="#2ECC71"/>
