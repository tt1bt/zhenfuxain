  <text x="80" y="50" fill="#1A5F7A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">01</text>
  <text x="80" y="70" fill="#1A5F7A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold">研究背景</text>
  <line x1="80" y1="95" x2="400" y2="95" stroke="#E0E6ED" stroke-width="1"/>
  <rect x="80" y="130" width="500" height="540" rx="12" fill="#F5F7FA"/>
  <text x="120" y="180" fill="#2C3E50" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold">遥感数据快速增长</text>
  <text x="120" y="215" fill="#7F8C8D" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">随着遥感技术发展，数据规模持续扩大</text>
  <text x="120" y="280" fill="#2C3E50" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold">长尾分布特性</text>
  <text x="120" y="315" fill="#7F8C8D" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">少数头部类别样本充足，大量尾部类别样本稀缺</text>
  <text x="120" y="380" fill="#2C3E50" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold">实际应用需求</text>
  <text x="120" y="415" fill="#7F8C8D" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">灾害监测、异常目标发现等更关注尾部类别</text>
  <rect x="620" y="130" width="560" height="540" rx="12" fill="#1A5F7A" opacity="0.1"/>
  <text x="660" y="200" fill="#1A5F7A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">遥感图像数据规模</text>
  <text x="660" y="230" fill="#7F8C8D" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">持续增长，数据量呈指数级上升</text>
  <rect x="660" y="260" width="480" height="30" rx="4" fill="#E0E6ED"/>
  <rect x="660" y="260" width="380" height="30" rx="4" fill="#3498DB"/>
  <text x="660" y="320" fill="#2C3E50" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">长尾分布示意</text>
